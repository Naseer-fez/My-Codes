name: Weekly Change Check

on:
  schedule:
    # Runs every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual triggering from the Actions tab

jobs:
  check-changes:
    name: Check for Changes Across All Repos
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # -------------------------------------------------------
      # 1. Checkout with full history + submodules
      # -------------------------------------------------------
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          # Use the default GITHUB_TOKEN so git push works
          token: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------
      # 2. Configure git identity for bot commits
      # -------------------------------------------------------
      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # -------------------------------------------------------
      # 3. Read AllLinks.txt and display tracked repos
      # -------------------------------------------------------
      - name: Read AllLinks.txt and list tracked repos
        id: read-links
        run: |
          echo "========================================"
          echo "  Reading AllLinks.txt"
          echo "========================================"

          if [ ! -f AllLinks.txt ]; then
            echo "::error::AllLinks.txt not found in repository root!"
            exit 1
          fi

          # Extract unique repo URLs (handles space/newline separated)
          # Also strip trailing .git and re-deduplicate to handle
          # "repo" vs "repo.git" duplicates
          REPOS=$(tr ' ' '\n' < AllLinks.txt \
            | grep -E 'https?://' \
            | sed 's/\.git$//' \
            | sort -u)
          COUNT=$(echo "$REPOS" | wc -l)

          echo "Found $COUNT unique repos in AllLinks.txt:"
          echo "$REPOS" | while read -r url; do
            NAME=$(basename "$url")
            echo "  - $NAME ($url)"
          done

          # Save to file for next step
          echo "$REPOS" > /tmp/repo_urls.txt

      # -------------------------------------------------------
      # 4. Read last checked hash (parent repo)
      # -------------------------------------------------------
      - name: Read last checked hash
        id: last-hash
        run: |
          if [ -f .last-check-hash ]; then
            LAST_HASH=$(cat .last-check-hash | tr -d '[:space:]')
            echo "Found stored hash: $LAST_HASH"
          else
            LAST_HASH=""
            echo "No .last-check-hash file found — first run"
          fi
          echo "hash=$LAST_HASH" >> "$GITHUB_OUTPUT"

      # -------------------------------------------------------
      # 5. Get current HEAD hash
      # -------------------------------------------------------
      - name: Get current HEAD hash
        id: current-hash
        run: |
          CURRENT_HASH=$(git rev-parse HEAD)
          echo "Current HEAD hash: $CURRENT_HASH"
          echo "hash=$CURRENT_HASH" >> "$GITHUB_OUTPUT"

      # -------------------------------------------------------
      # 6. Check each submodule for upstream changes
      # -------------------------------------------------------
      - name: Check submodules for upstream changes
        id: submodule-check
        run: |
          echo "========================================"
          echo "  Checking submodules for new commits"
          echo "========================================"

          CHANGES_FOUND=false

          while read -r url; do
            [ -z "$url" ] && continue
            NAME=$(basename "$url")

            if [ ! -d "$NAME" ]; then
              echo "⚠️  $NAME — directory not found (not yet cloned as submodule)"
              continue
            fi

            echo ""
            echo "── $NAME ──"

            cd "$NAME"

            # Fetch latest from upstream
            git fetch origin 2>/dev/null || {
              echo "   ⚠️  Failed to fetch from origin"
              cd ..
              continue
            }

            LOCAL=$(git rev-parse HEAD 2>/dev/null)

            # Try multiple strategies to find the remote default branch
            REMOTE=""
            # Strategy 1: origin/HEAD (may not be set in CI)
            REMOTE=$(git rev-parse origin/HEAD 2>/dev/null) || true
            # Strategy 2: Check for common default branch names
            if [ -z "$REMOTE" ]; then
              for branch in main master; do
                if git rev-parse "origin/$branch" >/dev/null 2>&1; then
                  REMOTE=$(git rev-parse "origin/$branch")
                  break
                fi
              done
            fi
            # Strategy 3: Use ls-remote to find the actual HEAD
            if [ -z "$REMOTE" ]; then
              DEFAULT_BRANCH=$(git ls-remote --symref origin HEAD 2>/dev/null \
                | grep '^ref:' | sed 's|ref: refs/heads/||; s|\tHEAD||')
              if [ -n "$DEFAULT_BRANCH" ]; then
                git fetch origin "$DEFAULT_BRANCH" 2>/dev/null
                REMOTE=$(git rev-parse "origin/$DEFAULT_BRANCH" 2>/dev/null) || true
              fi
            fi

            if [ -z "$REMOTE" ]; then
              echo "   ⚠️  Could not determine remote HEAD"
              cd ..
              continue
            fi

            if [ "$LOCAL" != "$REMOTE" ]; then
              echo "   🔄 Changes detected!"
              echo "      Local:  $LOCAL"
              echo "      Remote: $REMOTE"
              CHANGES_FOUND=true
            else
              echo "   ✅ Up to date ($LOCAL)"
            fi

            cd ..
          done < /tmp/repo_urls.txt

          echo ""
          echo "submodule_changes=$CHANGES_FOUND" >> "$GITHUB_OUTPUT"

      # -------------------------------------------------------
      # 7. Compare parent repo hash and decide action
      # -------------------------------------------------------
      - name: Compare hashes and update if changed
        env:
          LAST_HASH: ${{ steps.last-hash.outputs.hash }}
          CURRENT_HASH: ${{ steps.current-hash.outputs.hash }}
          SUBMODULE_CHANGES: ${{ steps.submodule-check.outputs.submodule_changes }}
        run: |
          echo "========================================"
          echo "  SUMMARY"
          echo "========================================"
          echo "  Last checked hash   : ${LAST_HASH:-<none>}"
          echo "  Current HEAD hash   : $CURRENT_HASH"
          echo "  Submodule changes   : $SUBMODULE_CHANGES"
          echo "========================================"

          PARENT_CHANGED=false
          if [ -n "$LAST_HASH" ] && [ "$LAST_HASH" != "$CURRENT_HASH" ]; then
            PARENT_CHANGED=true
          fi

          # On first run (no LAST_HASH), just save the hash without
          # claiming there was a "change"
          FIRST_RUN=false
          if [ -z "$LAST_HASH" ]; then
            FIRST_RUN=true
          fi

          if [ "$PARENT_CHANGED" = "true" ] || [ "$SUBMODULE_CHANGES" = "true" ] || [ "$FIRST_RUN" = "true" ]; then
            echo ""
            if [ "$FIRST_RUN" = "true" ]; then
              echo "📝 First run — saving initial hash baseline."
            fi
            if [ "$PARENT_CHANGED" = "true" ]; then
              echo "🔄 Parent repo has new commits since last check."
            fi
            if [ "$SUBMODULE_CHANGES" = "true" ]; then
              echo "🔄 One or more submodules have upstream changes."
            fi

            # Update the hash file
            echo "$CURRENT_HASH" > .last-check-hash
            echo ""
            echo "Updated .last-check-hash → $CURRENT_HASH"

            # Commit and push
            git add .last-check-hash
            # Use --allow-empty to avoid failing if hash didn't change
            git diff --cached --quiet && {
              echo "ℹ️  No staged changes — skipping commit."
              exit 0
            }
            git commit -m "chore: update change-check hash [skip ci]"

            # Get the current branch name for explicit push
            BRANCH=$(git rev-parse --abbrev-ref HEAD)
            echo "Pushing to origin/$BRANCH..."
            git push origin "HEAD:$BRANCH"
            echo "✅ Committed and pushed updated hash file."
          else
            echo ""
            echo "✅ No changes detected anywhere. Nothing to do."
          fi
